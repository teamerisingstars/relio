version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/relio/templates/web"
    schedule:
      interval: "weekly"
    groups:
      # Keep React and its type packages in one PR so their major versions can
      # never be bumped out of sync (see #10).
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
