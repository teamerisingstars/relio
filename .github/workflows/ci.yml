name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # Postgres + pgvector so the backend conformance suite and integration tests
    # run against BOTH backends (SQLite always; Postgres via this service).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RELIO_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/relio_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,postgres]"
      - name: Test (SQLite + Postgres, integration included) with coverage gate
        run: pytest -q -m "integration or not integration" --cov=relio --cov-fail-under=85
