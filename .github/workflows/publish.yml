name: Publish to PyPI

# Automatic release. Just bump `version` in pyproject.toml to a final X.Y.Z and
# push to main — this workflow tags it, publishes to PyPI (OIDC Trusted
# Publishing, no stored token), and creates the GitHub Release from CHANGELOG.md.
# Dev / pre-release versions (0.1.6.dev0, rc, a, b) are skipped. It's idempotent:
# it only acts when no GitHub Release exists yet for that version, so a re-push or
# a recovered failed attempt just works.
on:
  push:
    branches: [main]
    paths: ["pyproject.toml"]   # a version change lives here
  workflow_dispatch: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.decide.outputs.go }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::notice::$VERSION is a dev/pre-release — not publishing"
            echo "go=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::release v$VERSION already exists — nothing to do"
            echo "go=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "go=true" >> "$GITHUB_OUTPUT"

  release:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    environment: pypi            # matches the PyPI Trusted Publisher (this workflow)
    permissions:
      contents: write            # tag + GitHub Release
      id-token: write            # OIDC Trusted Publishing
    env:
      VERSION: ${{ needs.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build + check
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Tag the release (force-moves a stale tag from a failed attempt)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "v$VERSION"
          git push -f origin "v$VERSION"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Release notes from CHANGELOG
        run: |
          awk -v v="[$VERSION]" '
            index($0, "## " v)==1 {grab=1; next}
            grab && index($0, "## [")==1 {exit}
            grab {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Release $VERSION" > RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            dist/*.whl dist/*.tar.gz
