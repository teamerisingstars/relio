name: Publish to PyPI

# Releasing is now: bump the version in pyproject.toml, then
#   git tag v0.1.6 && git push origin v0.1.6
# This workflow guards that the tag matches the version, builds, publishes to PyPI
# via Trusted Publishing (OIDC — no stored token), and creates the GitHub Release
# with notes lifted straight from CHANGELOG.md. No manual release drafting.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # manual re-run button (won't publish without a tag)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Guard — tag must match pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$TAG version=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::tag v$TAG does not match pyproject version $VERSION"
            exit 1
          fi
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="[$VERSION]" '
            index($0, "## " v)==1 {grab=1; next}
            grab && index($0, "## [")==1 {exit}
            grab {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::no CHANGELOG section for $VERSION; using a placeholder"
            echo "Release $VERSION" > RELEASE_NOTES.md
          fi
          echo "----- notes -----"; cat RELEASE_NOTES.md
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            RELEASE_NOTES.md

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi          # must match the Trusted Publisher configured on PyPI
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to create the GitHub Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            dist/*.whl dist/*.tar.gz
