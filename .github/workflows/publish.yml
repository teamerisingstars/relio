name: Publish to PyPI

# Runs when you publish a GitHub Release (Releases -> Draft a new release ->
# tag e.g. v0.1.1 -> Publish). Builds the package and uploads it to PyPI via
# Trusted Publishing (OIDC) — no API token or secret stored anywhere.
on:
  release:
    types: [published]
  workflow_dispatch: {}   # manual "Run workflow" button (Actions tab) for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # must match the Trusted Publisher you create on PyPI
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
